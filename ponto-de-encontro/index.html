<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Ponto de Encontro — Marina | WeBoat Brasil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a1628; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .container { max-width: 640px; width: 100%; text-align: center; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { font-size: 0.95rem; color: #a0b4cc; margin-bottom: 20px; }
    video { width: 100%; max-width: 640px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    .logo { margin-bottom: 24px; }
    .logo img { height: 40px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/assets/images/logo-weboat-white.webp" alt="WeBoat Brasil" onerror="this.style.display='none'">
    </div>
    <h1>Instruções — Ponto de Encontro</h1>
    <p>Veja como chegar na marina no dia do seu passeio</p>
    <video controls playsinline preload="metadata">
      <source src="/assets/videos/instrucoes-marina.mp4" type="video/mp4">
      Seu navegador não suporta vídeo HTML5.
    </video>
  </div>
</body>
</html>
